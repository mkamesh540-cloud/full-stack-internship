<!DOCTYPE html>
<html>
    <head>
        <title>LOGIN PAGE</title>
    </head>
    <body style="background-color: lightgray;">

        <div class="css-form">
        <h1 class="css-wel">Welcome</h1>
        <p class="css-user">Username :</p>
        <input type="text" placeholder="enter username" class="css-name">
        <p class="css-email-type">Email :</p>
        <input type="email" placeholder="enter your email" class="css-email" id="email">
        <P class="css-pass-type">Password :</P>
        <input type="password" placeholder="enter your password" class="css-pass" id="password">
        <button class="css-sign" onclick="login();">sign in</button>
        </div>

        <style>
                body{
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    margin-top: 200px;
                    height: 50px;
                }

                 .css-wel{
                    margin-top: 0;
                    font-weight: bold;
                    font-size: 40px;
                    text-align: center;
                }


                .css-form{
                    background-color: white;
                    padding: 40px 90px;
                    display: grid;
                    margin-top: 100px;
                    border-radius: 20px;
                    box-shadow: 0 4px 10px lightsalmon;
                
                }

                .css-email,.css-pass, .css-name{
                    padding: 5px;
                    margin-bottom: 20px;
                
                }

                .css-sign{
                    cursor: pointer;
                    padding: 5px;
                    background-color: darkblue;
                    border-radius: 20px;
                    border : none;
                    color: white;
                    margin-top: 20px;
                }


                .css-user, .css-email-type, .css-pass-type {
                    margin: 1px;
                }

                
        </style>

        <script>
           async function login() {

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const response = await fetch(
        "http://localhost:3000/signin",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        }
    );

    const data = await response.json();

    alert('sign in succesfull');

    if(data.success){
       window.location.href = "home.html";
    }else{
        alert(data.message);
    }

    
}
        </script>
       
    </body>
</html>
